services:
  - type: web
    name: signal-api
    runtime: docker
    dockerfilePath: src/backend/Signal.API/Dockerfile
    dockerContext: src/backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_HTTP_PORTS
        value: "8080"
      - key: Kafka__Enabled
        value: "false"
      - key: Jwt__Issuer
        value: signal-api
      - key: Jwt__Audience
        value: signal-dashboard
      - key: SignalEngine__BaseUrl
        fromService:
          name: signal-engine
          type: web
          property: host
      - key: Jwt__Key
        generateValue: true
      - key: MarketData__TwelveDataApiKey
        sync: false
      - key: News__FinnhubApiKey
        sync: false
      - key: AllowedOrigins__0
        sync: false

  - type: web
    name: signal-engine
    runtime: docker
    dockerfilePath: src/ai-services/signal-engine/Dockerfile
    dockerContext: src/ai-services/signal-engine
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
