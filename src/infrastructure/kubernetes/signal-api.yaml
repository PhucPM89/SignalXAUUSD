apiVersion: apps/v1
kind: Deployment
metadata:
  name: signal-api
  namespace: signal
  labels:
    app: signal-api
spec:
  replicas: 2                      # 2 replicas behind load balancer
  selector:
    matchLabels:
      app: signal-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0            # zero-downtime deploy (k8s waits for new pod)
      maxSurge: 1
  template:
    metadata:
      labels:
        app: signal-api
    spec:
      containers:
        - name: signal-api
          image: ghcr.io/OWNER/REPO/signal-api:latest
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: ConnectionStrings__Postgres
              valueFrom:
                secretKeyRef:
                  name: signal-secrets
                  key: postgres-connection-string
            - name: ConnectionStrings__Redis
              valueFrom:
                secretKeyRef:
                  name: signal-secrets
                  key: redis-connection-string
            - name: Jwt__Key
              valueFrom:
                secretKeyRef:
                  name: signal-secrets
                  key: jwt-secret
            - name: MarketData__TwelveDataApiKey
              valueFrom:
                secretKeyRef:
                  name: signal-secrets
                  key: twelve-data-api-key
            - name: MarketData__PolygonApiKey
              valueFrom:
                secretKeyRef:
                  name: signal-secrets
                  key: polygon-api-key
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: signal-api
  namespace: signal
spec:
  selector:
    app: signal-api
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
# HPA: scale API pods under high WebSocket connection load
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: signal-api-hpa
  namespace: signal
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: signal-api
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
