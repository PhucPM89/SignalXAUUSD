apiVersion: apps/v1
kind: Deployment
metadata:
  name: nlp-service
  namespace: signal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nlp-service
  template:
    metadata:
      labels:
        app: nlp-service
    spec:
      containers:
        - name: nlp-service
          image: ghcr.io/OWNER/REPO/nlp-service:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: nlp-service
  namespace: signal
spec:
  selector:
    app: nlp-service
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: regime-detector
  namespace: signal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: regime-detector
  template:
    metadata:
      labels:
        app: regime-detector
    spec:
      containers:
        - name: regime-detector
          image: ghcr.io/OWNER/REPO/regime-detector:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: regime-detector
  namespace: signal
spec:
  selector:
    app: regime-detector
  ports:
    - port: 8000
      targetPort: 8000
