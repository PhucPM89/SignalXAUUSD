apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: signal
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/OWNER/REPO/frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                secretKeyRef:
                  name: signal-secrets
                  key: api-url
            - name: NEXT_PUBLIC_SIGNALR_URL
              valueFrom:
                secretKeyRef:
                  name: signal-secrets
                  key: signalr-url
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: signal
spec:
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: signal-ingress
  namespace: signal
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-read-timeout: "86400"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "86400"
    # WebSocket support for SignalR
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "30"
spec:
  tls:
    - hosts:
        - signal.yourdomain.com
      secretName: signal-tls
  rules:
    - host: signal.yourdomain.com
      http:
        paths:
          # Frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
          # API + SignalR hub
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: signal-api
                port:
                  number: 8000
          - path: /hubs
            pathType: Prefix
            backend:
              service:
                name: signal-api
                port:
                  number: 8000
---
# Secrets template — fill in before deploy, or use Sealed Secrets / Vault
apiVersion: v1
kind: Secret
metadata:
  name: signal-secrets
  namespace: signal
type: Opaque
stringData:
  api-url: "https://signal.yourdomain.com"
  signalr-url: "https://signal.yourdomain.com/hubs/trading"
  postgres-connection: "Host=postgres;Database=signal_db;Username=signal;Password=CHANGEME"
  redis-connection: "redis:6379"
  kafka-brokers: "kafka:9092"
