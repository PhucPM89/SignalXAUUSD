global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: 'signal-api'
    static_configs:
      - targets: ['signal-api:8080']
    metrics_path: /metrics
    scrape_interval: 5s    # more frequent for trading metrics

  - job_name: 'signal-engine'
    static_configs:
      - targets: ['signal-engine:8000']
    metrics_path: /metrics

  - job_name: 'nlp-service'
    static_configs:
      - targets: ['nlp-service:8000']
    metrics_path: /metrics

  - job_name: 'regime-detector'
    static_configs:
      - targets: ['regime-detector:8000']
    metrics_path: /metrics

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:9187']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:9121']

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9308']
