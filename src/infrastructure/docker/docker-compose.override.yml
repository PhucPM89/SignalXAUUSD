version: '3.9'
# Dev overrides — hot reload, no SSL, verbose logging
services:
  signal-api:
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    volumes:
      - ../../backend:/app/src   # hot reload via dotnet watch

  signal-engine:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level debug
    volumes:
      - ../../ai-services/signal-engine:/app

  nlp-service:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    command: npm run dev
    environment:
      NODE_ENV: development
    volumes:
      - ../../frontend:/app
      - /app/node_modules
      - /app/.next
