version: '3.9'

# XAUUSD Signal Platform — Full Stack
# Services: API | Signal Engine | NLP | Regime Detector | Frontend
#           PostgreSQL | Redis | Kafka | Zookeeper
#           Prometheus | Grafana | OTel Collector | Nginx

networks:
  signal-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres-data:
  redis-data:
  kafka-data:
  prometheus-data:
  grafana-data:

services:

  # ── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: signal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: signal
      POSTGRES_USER: signal
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - signal-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signal"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: signal-redis
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - signal-net
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    container_name: signal-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - signal-net

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: signal-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # Topic config: trading-signals — keyed by symbol, 4 partitions (reserved for multi-symbol future)
      KAFKA_NUM_PARTITIONS: 4
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data
    ports:
      - "9092:9092"
    networks:
      - signal-net
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Application Services ──────────────────────────────────────────────────

  signal-api:
    build:
      context: ../../backend
      dockerfile: Signal.API/Dockerfile
    container_name: signal-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      signal-engine:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Postgres: "Host=postgres;Database=signal;Username=signal;Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD}"
      Kafka__BootstrapServers: "kafka:9092"
      Jwt__Key: ${JWT_SECRET}
      Jwt__Issuer: "signal-api"
      Jwt__Audience: "signal-dashboard"
      MarketData__TwelveDataApiKey: ${TWELVE_DATA_API_KEY}
      MarketData__PolygonApiKey: ${POLYGON_API_KEY}
      News__FinnhubApiKey: ${FINNHUB_API_KEY}
      SignalEngine__BaseUrl: "http://signal-engine:8000"
      AllowedOrigins__0: "http://localhost:3000"
      AllowedOrigins__1: "https://${DOMAIN}"
      OtelCollector__Endpoint: "http://otel-collector:4317"
    ports:
      - "5000:8080"
    networks:
      - signal-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  signal-engine:
    build:
      context: ../../ai-services/signal-engine
      dockerfile: Dockerfile
    container_name: signal-engine
    restart: unless-stopped
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OTEL_SERVICE_NAME: "signal-engine"
    ports:
      - "8001:8000"
    networks:
      - signal-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G

  nlp-service:
    build:
      context: ../../ai-services/nlp-service
      dockerfile: Dockerfile
    container_name: signal-nlp
    restart: unless-stopped
    ports:
      - "8002:8000"
    networks:
      - signal-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3

  regime-detector:
    build:
      context: ../../ai-services/regime-detector
      dockerfile: Dockerfile
    container_name: signal-regime
    restart: unless-stopped
    ports:
      - "8003:8000"
    networks:
      - signal-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://signal-api:8080
        NEXT_PUBLIC_HUB_URL: ws://signal-api:8080/hubs/trading
    container_name: signal-frontend
    restart: unless-stopped
    depends_on:
      - signal-api
    ports:
      - "3000:3000"
    networks:
      - signal-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Observability ─────────────────────────────────────────────────────────

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.113.0
    container_name: signal-otel
    restart: unless-stopped
    volumes:
      - ./otel/otel-collector.yaml:/etc/otelcol/config.yaml
    ports:
      - "4317:4317"   # gRPC
      - "4318:4318"   # HTTP
    networks:
      - signal-net

  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: signal-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    ports:
      - "9090:9090"
    networks:
      - signal-net

  grafana:
    image: grafana/grafana:11.3.2
    container_name: signal-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_SERVER_ROOT_URL: "https://${DOMAIN}/grafana"
      GF_INSTALL_PLUGINS: "grafana-clock-panel"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "3001:3000"
    networks:
      - signal-net

  # ── Reverse Proxy ──────────────────────────────────────────────────────────

  nginx:
    image: nginx:1.27-alpine
    container_name: signal-nginx
    restart: unless-stopped
    depends_on:
      - signal-api
      - frontend
    volumes:
      - ../../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../../nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - signal-net
